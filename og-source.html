<!doctype html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; background: #F4EDDF;
  display: flex; align-items: center; justify-content: center;
  font-family: "Cormorant Garamond", serif; font-style: italic; }
.wrap { width: 100%; padding: 80px 100px; display: flex; flex-direction: column; gap: 32px; }
.row { display: flex; align-items: center; justify-content: space-between; gap: 40px; }
.wordmark { height: 140px; width: auto; }
.monogram { height: 180px; width: auto; }
.timestamp { height: 80px; width: auto; }
.quote { font-size: 56px; font-weight: 500; color: #0E0E0E; text-align: center; }
.quote em { color: #4F8F6E; }
.meta { display: flex; justify-content: space-between;
  font-family: "IBM Plex Mono", monospace; font-size: 16px;
  letter-spacing: .14em; text-transform: uppercase; color: rgba(14,14,14,.55); font-style: normal; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
</head><body>
<div class="wrap">
  <div class="row">
    <img class="wordmark" src="/assets/brand/wordmark/tentative-final-light.svg">
    <img class="timestamp" src="/assets/brand/timestamp/tentative-final.svg">
    <img class="monogram" src="/assets/brand/monogram/tentative-final.svg">
  </div>
  <div class="quote">失敗できる、<em>を誇りに</em>。</div>
  <div class="meta">
    <span>FROM OKINAWA · 2026</span>
    <span>VOL.1 — 2026.10</span>
  </div>
</div>
</body></html>
