<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F1E8D5">

<title>404 — stet ─ TYP0stet</title>
<meta name="description" content="探していたページが見つかりません。けれど、迷い込んだのも一つの stet。">
<meta name="robots" content="noindex">

<link rel="icon" type="image/svg+xml" href="/assets/brand/monogram/tentative-final.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=IBM+Plex+Sans+JP:wght@300;400;500&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Inconsolata:wght@400;700;900&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bone: #F1E8D5;
    --bone-deep: #E9DFC5;
    --ink: #0E0E0E;
    --mint: #92E5BD;
    --terracotta: #C7553E;
    --rule: rgba(14, 14, 14, 0.12);
    --muted: rgba(14, 14, 14, 0.55);

    --serif: "Shippori Mincho", "Hiragino Mincho ProN", serif;
    --sans:  "IBM Plex Sans JP", "Helvetica Neue", Arial, sans-serif;
    --mono:  "IBM Plex Mono", ui-monospace, Menlo, monospace;
    --num:   "Inconsolata", ui-monospace, Menlo, monospace;
    --hand-jp: "Klee One", serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bone); color: var(--ink);
    font-family: var(--sans); line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    min-height: 100svh;
    display: flex; flex-direction: column;
  }
  img { display: block; max-width: 100%; height: auto; }
  a { color: inherit; text-decoration: none; }

  .site-header {
    border-bottom: 1px solid var(--rule);
    padding: 14px 28px;
  }
  .site-header__inner {
    max-width: 1320px; margin: 0 auto;
    display: flex; align-items: center; gap: 32px;
  }
  .site-header__brand img { width: 140px; }

  main {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 80px 28px 120px;
  }
  .err {
    font-family: var(--num); font-weight: 900;
    font-size: clamp(120px, 22vw, 280px);
    line-height: 0.95; letter-spacing: -0.02em;
    color: var(--ink);
    position: relative;
    display: inline-block;
  }
  .err em {
    font-style: normal;
    font-family: var(--hand-jp); font-weight: 600;
    color: var(--mint);
    font-size: 0.4em;
    position: absolute;
    bottom: 0; right: -0.5em;
    transform: rotate(-6deg) translateY(-30%);
  }
  .err-lead {
    font-family: var(--serif); font-weight: 600;
    font-size: clamp(24px, 3.6vw, 36px);
    line-height: 1.5;
    margin: 32px 0 14px;
  }
  .err-lead em {
    font-style: normal; font-family: var(--hand-jp); color: var(--mint);
  }
  .err-body {
    font-family: var(--serif); font-size: 16px; line-height: 1.95;
    color: var(--muted);
    max-width: 460px; margin: 0 auto 36px;
  }
  .err-btn {
    display: inline-flex; align-items: center; gap: 14px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 18px 32px;
    background: var(--ink); color: var(--bone);
    border: 1px solid var(--ink);
    transition: background 240ms ease, color 240ms ease;
  }
  .err-btn:hover { background: var(--bone); color: var(--ink); }
  .err-btn::after { content: "↺"; font-size: 16px; }
  .err-secondary {
    margin-top: 18px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
    color: var(--muted); text-transform: uppercase;
  }
  .err-secondary a:hover { color: var(--ink); }
  .err-secondary span { margin: 0 8px; opacity: 0.4; }

  .site-footer {
    border-top: 1px solid var(--rule);
    padding: 32px 28px;
    text-align: center;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.14em; color: var(--muted);
  }

  /* --- 4:81 floating time widget --- */
  .time-widget {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink); color: var(--bone);
    padding: 10px 16px; border-radius: 999px;
    display: inline-flex; align-items: baseline; gap: 10px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    cursor: help; z-index: 60;
    box-shadow: 0 8px 24px -12px rgba(14,14,14,0.4);
    transition: transform 200ms ease, box-shadow 200ms ease;
  }
  .time-widget:hover { transform: translateY(-2px); box-shadow: 0 14px 32px -14px rgba(14,14,14,0.45); }
  .time-widget__label { opacity: 0.6; }
  .time-widget__clock {
    font-family: var(--num); font-weight: 700; font-size: 16px;
    letter-spacing: 0.04em; color: var(--mint); text-transform: none;
  }
  .time-widget__colon {
    display: inline-block;
    animation: stet-blink 1.06s steps(2, end) infinite;
  }
  @keyframes stet-blink { 50% { opacity: 0; } }
  .time-widget__tip {
    position: absolute; bottom: calc(100% + 14px); right: 0;
    background: var(--ink); color: var(--bone);
    padding: 14px 18px; width: 240px; border-radius: 4px;
    font-family: var(--serif); font-size: 13px; line-height: 1.7;
    letter-spacing: 0; text-transform: none;
    opacity: 0; pointer-events: none; transform: translateY(6px);
    transition: opacity 240ms ease, transform 240ms ease;
  }
  .time-widget__tip em { font-style: normal; color: var(--mint); font-family: var(--hand-jp); }
  .time-widget__tip { display: none !important; }
  @media (max-width: 720px) {
    .site-header { padding: 12px 20px; }
    .site-header__brand img { width: 108px; }
    main { padding: 56px 20px 88px; }
    .err em { right: -0.8em; }
    .time-widget { bottom: 16px; right: 16px; padding: 8px 12px; gap: 8px; font-size: 10px; }
    .time-widget__clock { font-size: 14px; }
    .time-widget__tip { width: 210px; font-size: 12px; }
  }

  /* Cotton fabric texture overlay (subtle) */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='220' height='220'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.13 0 0 0 0 0.09 0 0 0 0.32 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.5;
    mix-blend-mode: multiply;
  }

  .site-footer__voice {
    font-family: var(--hand-jp);
    font-size: 13px;
    color: var(--mint);
    letter-spacing: 0.02em;
    margin-left: 14px;
    opacity: 0.92;
  }
  @media (max-width: 720px) {
    .site-footer__voice { display: block; margin: 8px 0 0 0; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">
    <a href="/" class="site-header__brand" aria-label="TYP0stet home">
      <img src="/assets/brand/wordmark/tentative-final-light.svg" alt="TYP0stet">
    </a>
  </div>
</header>

<main>
  <p class="err">404<em>stet</em></p>
  <h1 class="err-lead">道を、間違えた<em>みたい</em>。</h1>
  <p class="err-body">
    探していたページは、ここには無い。<br>
    でも、迷い込んだのも一つの <strong>stet</strong> です。直さず、戻ってみる。
  </p>
  <a class="err-btn" href="/">最初に戻る</a>
  <p class="err-secondary">
    <a href="/#stet">Shop</a><span>·</span>
    <a href="/magazine/">Magazine</a><span>·</span>
    <a href="/manifest.html">Manifesto</a>
  </p>
</main>

<footer class="site-footer">
  © 2026 TYP0stet ─ Remoi, K.K. ─ 失敗を、誇りに。
</footer>

<div class="time-widget" tabindex="0" role="button" aria-label="TYP0stet time" onclick="this.classList.toggle('is-open')">
  <span class="time-widget__label">stet time</span>
  <span class="time-widget__clock">4<span class="time-widget__colon">:</span>81</span>
  <div class="time-widget__tip" role="tooltip">
    これは時刻ではない。<em>し (4) っ (8) ぱい (1)</em> の語呂。<br>毎日この時刻は、ない。
  </div>
</div>

</body>
</html>
