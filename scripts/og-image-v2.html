<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>TYP0stet OG image v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Serif+JP:wght@500;600;700&family=Inconsolata:wght@900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0E0E0E;
    width: 1200px; height: 630px;
    overflow: hidden;
    font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  }
  .og {
    width: 1200px; height: 630px;
    background: #0E0E0E;
    color: #F4EDDF;
    position: relative;
    overflow: hidden;
    padding: 88px;
  }
  .og::before {
    /* subtle vignette */
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 80% 20%, rgba(146,229,189,0.05), transparent 50%),
      radial-gradient(ellipse at 20% 80%, rgba(199,85,62,0.04), transparent 60%);
    pointer-events: none;
  }
  .monogram {
    position: absolute;
    top: 64px;
    right: 88px;
    width: 200px;
    height: 200px;
    object-fit: contain;
  }
  .main {
    position: relative;
    font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    font-weight: 500;
    font-size: 76px;
    line-height: 1.34;
    letter-spacing: 0.02em;
    color: #F4EDDF;
    margin-top: 24px;
    max-width: 820px;
  }
  .wordmark-wrap {
    position: absolute;
    left: 88px;
    bottom: 116px;
    width: 280px;
  }
  .wordmark-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }
  .meta-line {
    position: absolute;
    left: 88px;
    bottom: 72px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.22em;
    color: rgba(146, 229, 189, 0.85);
    text-transform: uppercase;
  }
  .meta-line .rule {
    width: 36px;
    height: 1px;
    background: rgba(146, 229, 189, 0.55);
  }
  .timestamp {
    position: absolute;
    right: 88px;
    bottom: 64px;
    font-family: 'Inconsolata', ui-monospace, monospace;
    font-weight: 900;
    font-size: 64px;
    line-height: 1;
    color: #92E5BD;
    letter-spacing: 0.04em;
  }
  .timestamp small {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.28em;
    color: rgba(146, 229, 189, 0.5);
    text-align: right;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div class="og">
  <img class="monogram" src="../assets/brand/monogram/tentative-final.svg" alt="">
  <h1 class="main">失敗できる事が、<br>人間の証明になる。</h1>
  <div class="wordmark-wrap">
    <img src="../assets/brand/wordmark/tentative-final-dark.svg" alt="TYP0stet">
  </div>
  <div class="meta-line">
    <span class="rule"></span>
    <span>Stet 01 — Recieved.</span>
  </div>
  <div class="timestamp">
    4:81
    <small>SHI-PPA-I</small>
  </div>
</div>
</body>
</html>
